<!DOCTYPE html>
<html>
<head>
  <title>EduMind</title>
  <script src="https://js.putter.com/v2/"></script>
  <style>
    body {
      background-color: #1a1a2e;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    
    h1 {
      color: #9b59b6;


    input {
      width: 80%;
      padding: 10px; 
      border-radius: 8px;
      border: none;
      font-size: 16px;
      margin-top: 20px;
    }
    
    button{
      background-color: #9b59b6;
      colour: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px:
      margin-top: 10px;
      cursor: pointer;
    }
    
    #answer {
      margin-top: 30px;
      font-size: 18px;
      color: #d0d0ff;
    }
  </style>
</head>
<body>

    <h1>EduMind</h1>
    <p>Ask a study question below:</p>

    <!-- Secure Key Input Field -->
    <div style="margin-bottom: 20px;">
        <label for="apiKeyBox" style="font-size: 0.9rem; color: #b19ffb; display: block; margin-bottom: 5px;">Paste your Gemini API Key:</label>
        <input type="password" id="apiKeyBox" placeholder="AIzaSy..." style="width: 80%; background-color: #252538; color: #fff; border: 1px solid #9b59b6; border-radius: 8px; padding: 10px;">
    </div>

    <!-- Your Original Question Box -->
    <input type="text" id="questionBox" placeholder="Type your question here...">
    <br>
    <button onclick="askQuestion()">Ask</button>

    <div id="answer"></div>

<script>
function askQuestion() {
    // 1. Grab the key and the question right when the user clicks 'Ask'
    var API_KEY = document.getElementById("apiKeyBox").value.trim();
    var question = document.getElementById("questionBox").value.trim();
    
    var answerDiv = document.getElementById("answer");

    // 2. Quick safety checks
    if (!API_KEY) {
        answerDiv.innerHTML = "Error: Please paste your Gemini API key first!";
        return;
    }
    if (!question) {
        answerDiv.innerHTML = "Error: Please type a question!";
        return;
    }

    answerDiv.innerHTML = "Thinking...";

    // 3. Make the secure request using the entered key
    fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            contents: [{ parts: [{ text: question }] }]
        })
    })
    .then(function(response) {
        return response.json();
    })
    .then(function(data) {
        var answer = data.candidates ? data.candidates[0].content.parts[0].text : JSON.stringify(data);
        answerDiv.innerHTML = answer;
    })
    .catch(function(error) {
        answerDiv.innerHTML = "Error: " + error.message;
    });
}
</script>
</body>
